<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <title>Story Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Gautami', sans-serif;
      background-color: #f0f0f0;
    }

    .image-container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 800px;
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .top-text, .bottom-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 4px #000;
      padding: 10px;
    }

    .top-text {
      top: 10px;
      font-size: 28px;
    }

    .bottom-text {
      bottom: 10px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div class="image-container">
  <img src="chatgptfile/stories.png" alt="Minnu & Chitti Story Page">
  <div class="top-text">🐿️ మిన్ను & చిట్టీ కథ</div>
  <div class="bottom-text">ఆరోగ్యం గురించి చిట్టీ చెప్పిన మాటలు</div>
</div>

</body>
</html>
