<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rewards - FunLearn</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #fff6b7, #f6416c);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      color: #333;
    }

    .reward-box {
      background: #ffffffcc;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 0 20px rgba(255, 64, 129, 0.3);
      text-align: center;
      max-width: 600px;
      width: 80%;
    }

    h1 {
      font-size: 2.5rem;
      color: #f50057;
      margin-bottom: 10px;
    }

    .points {
      font-size: 1.5rem;
      margin: 10px 0;
    }

    .badge {
      font-size: 2rem;
      margin-top: 20px;
      font-weight: bold;
    }

    .back, #resetBtn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #ff4081;
      color: white;
      text-decoration: none;
      display: inline-block;
    }

    .back:hover, #resetBtn:hover {
      background: #f50057;
    }

    #resetBtn {
      background-color: #ff9800;
      margin-left: 10px;
    }

    #resetBtn:hover {
      background-color: #fb8c00;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="70" height="70" style="border-radius: 60%; position: fixed; top: 50px; right: 30px; z-index: 999;">


  <div class="reward-box">
    <h1>🎉 Your Rewards</h1>
    <div class="points">🏆 Total Points: <span id="pointsValue">0</span></div>
    <div class="badge" id="rewardBadge">🎖 Keep going!</div>
    <div>
      <a class="back" href="learn.html">⬅️ Back to Learn</a>
      <button id="resetBtn" onclick="resetPoints()">Reset Points</button>
    </div>
  </div>

  <script>
    function updateRewards() {
      let points = localStorage.getItem("totalPoints") || 0;
      document.getElementById("pointsValue").innerText = points;
      let badgeText = "🎖 Keep going!";
      
      if (points >= 101) {
        badgeText = "👑 Genius Legend!";
      } else if (points >= 51) {
        badgeText = "🥇 Brain Hero!";
      } else if (points >= 21) {
        badgeText = "🥈 Learning Champ!";
      } else if (points >= 1) {
        badgeText = "⭐ Beginner Star!";
      }

      document.getElementById("rewardBadge").innerText = badgeText;
    }

    function resetPoints() {
      localStorage.setItem("totalPoints", 0);
      updateRewards();
      alert("Points reset to 0!");
    }

    updateRewards();
    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
</body>
</html>
