<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drawing & Coloring</title>
  <style>
    /* --- unchanged CSS --- */
    body {
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #d63384;
      margin: 20px 0 10px;
    }

    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    #toolbar > * {
      padding: 8px 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    input[type="color"], input[type="range"] {
      height: 36px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      width: 100%;
      padding: 10px;
    }

    .preview-box {
      max-width: 300px;
      text-align: center;
    }

    .preview-box img {
      width: 100%;
      border: 4px solid #ff69b4;
      border-radius: 20px;
    }

    canvas {
      border: 4px solid #ff3399;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 0 10px #ff99cc;
      touch-action: none;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="60" height="60" style="border-radius: 60%; position: fixed; top: 40px; right: 40px; z-index: 999;">
  <h1>🎨 Draw What You See!</h1>

  <div id="toolbar">
    <label>Color: <input type="color" id="colorPicker" value="#444444" /></label>
    <label>Size: <input type="range" id="brushSize" min="1" max="10" value="1.5" /></label>
    <button onclick="useEraser()">Eraser</button>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveImage()">Save</button>
    <button id="fillToggle" onclick="toggleFill()">Fill Color: OFF</button>
    <label>Choose Image:
      <select id="imageSelector" onchange="changePreview()">
        <option value="cat.png">Cat</option>
        <option value="apple.png">Apple</option>
        <option value="ball.png">Ball</option>
        <option value="dog.png">Dog</option>
        <option value="sun.png">Sun</option>
        <option value="girl.png">Girl</option>
        <option value="parrot.png">Parrot</option>
        <option value="banana.png">Banana</option>
        <option value="Tree.png">Tree</option>
      </select>
    </label>
  </div>

  <div class="container">
    <div class="preview-box">
      <h2>Look & Draw</h2>
      <img src="image/cat.png" alt="Preview" id="preview-img" />
    </div>
    <div>
      <canvas id="drawingCanvas" width="600" height="600"></canvas>
    </div>
  </div>
  <a href="learn.html" class="back-btn">🔙 Back to Learn</a>
  <a href="daily.html">
  <button style="padding: 10px 20px; font-size: 18px; border-radius: 10px; margin: 20px; background-color: #ffd700; border: none; cursor: pointer;">
    ⬅ Back to Daily Challenges
  </button>
</a>


  <script>
    const canvas = document.getElementById("drawingCanvas");
    const ctx = canvas.getContext("2d");
    let painting = false;
    let erasing = false;
    let fillMode = false;

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");

    function toggleFill() {
      fillMode = !fillMode;
      document.getElementById("fillToggle").innerText = fillMode ? "Fill Color: ON" : "Fill Color: OFF";
    }

    function useEraser() {
      erasing = !erasing;
      if (erasing) fillMode = false;
    }

    function startPosition(e) {
      if (fillMode) {
        fillColor(e);
        return;
      }
      painting = true;
      draw(e);
    }

    function endPosition() {
      painting = false;
      ctx.beginPath();
    }

    function draw(e) {
      if (!painting || fillMode) return;

      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      ctx.lineWidth = parseFloat(brushSize.value);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = erasing ? "#ffffff" : colorPicker.value;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveImage() {
      const link = document.createElement('a');
      link.download = 'my_drawing.png';
      link.href = canvas.toDataURL();
      link.click();
      const today = new Date().toISOString().split("T")[0];
      const alreadyDone = localStorage.getItem("draw_date") === today;
      if (!alreadyDone) {
        localStorage.setItem("draw_done", "true");
        localStorage.setItem("draw_date", today);
        localStorage.setItem("draw_points_given", "");
        alert("✅ Drawing saved! Go back to Daily Challenges to claim your points.");
      } else {
        alert("🎉 Drawing saved! You've already marked this challenge for today.");
      }

    }

    function changePreview() {
      const selectedImage = document.getElementById("imageSelector").value;
      document.getElementById("preview-img").src = "image/" + selectedImage;
    }

    function fillColor(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor(e.clientX - rect.left);
      const y = Math.floor(e.clientY - rect.top);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const targetColor = getColorAtPixel(data, x, y);
      const fill = hexToRgb(colorPicker.value);

      if (!fill) return;

      floodFill(data, x, y, targetColor, fill);
      ctx.putImageData(imageData, 0, 0);
    }

    function getColorAtPixel(data, x, y) {
      const index = (y * canvas.width + x) * 4;
      return [data[index], data[index + 1], data[index + 2]];
    }

    function colorsMatch(a, b) {
      return a[0] === b[0] && a[1] === b[1] && a[2] === b[2];
    }

    function floodFill(data, x, y, target, fill) {
      const stack = [[x, y]];
      const width = canvas.width;

      while (stack.length) {
        const [cx, cy] = stack.pop();
        const index = (cy * width + cx) * 4;
        const current = [data[index], data[index + 1], data[index + 2]];

        if (colorsMatch(current, target)) {
          data[index] = fill[0];
          data[index + 1] = fill[1];
          data[index + 2] = fill[2];
          data[index + 3] = 255;

          stack.push([cx + 1, cy]);
          stack.push([cx - 1, cy]);
          stack.push([cx, cy + 1]);
          stack.push([cx, cy - 1]);
        }
      }
    }

    function hexToRgb(hex) {
      const match = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
      return match ? [
        parseInt(match[1], 16),
        parseInt(match[2], 16),
        parseInt(match[3], 16)
      ] : null;
    }

    canvas.addEventListener("mousedown", startPosition);
    canvas.addEventListener("mouseup", endPosition);
    canvas.addEventListener("mousemove", draw);

    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
</body>
</html>
