<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learn - FunLearn</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #b2fefa, #0ed2f7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #ffffffcc;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
      width: 80%;
      max-width: 600px;
    }

    h1 {
      color: #0288d1;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #444;
      margin-bottom: 30px;
    }

    .topics button,
    .topics a.topic-link {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 20px;
      background: #4dd0e1;
      color: white;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .topics button:hover,
    .topics a.topic-link:hover {
      background: #00bcd4;
    }

    .back {
      margin-top: 20px;
      font-size: 1rem;
      color: #0288d1;
      text-decoration: none;
      display: inline-block;
      background: #e1f5fe;
      padding: 10px 20px;
      border-radius: 15px;
    }

    .back:hover {
      background: #b3e5fc;
    }

    #resetBtn {
      position: fixed;
      top: 50px;
      right: 10px;
      background: #ff7043;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      z-index: 999;
    }

    #resetBtn:hover {
      background: #f4511e;
    }
  </style>
</head>
<body>

  <!-- Avatar Display -->
  <img id="userAvatar" alt="Your Avatar" width="90" height="90" style="border-radius: 60%; position: fixed; top: 90px; right: 30px; z-index: 999;">

  <!-- Points Display -->
  <div id="pointsDisplay" style="position: fixed; top: 5px; right: 10px; background: #ffeb3b; color: black; padding: 10px 10px; border-radius: 20px; font-weight: bold; z-index: 999;">
    🏆 Points: <span id="pointsValue">0</span>
  </div>

  <!-- Reset Button -->
  <button id="resetBtn" onclick="resetPoints()">Reset Points</button>

  <!-- Topics List -->
  <div class="container">
    <h1>🎓 Learn with Fun</h1>
    <p class="subtitle">Choose what you'd like to explore!</p>
    
    <div class="topics">
      <a href="alphabets_only.html" class="topic-link">🔤 A - Z Letters</a>
      <a href="letters.html" class="topic-link">🧠 A - Z with Words + Quiz</a>
      <a href="games.html" class="topic-link">🎮 Find the Letter Game</a>
      <a href="rewards.html" class="topic-link">🏅 Rewards</a>
      <a href="story.html" class="topic-link">📖 Story Time</a>
      <a href="puzzle.html" class="topic-link">🧩 Puzzle / Matching Game</a>
      <a href="colour.html" class="topic-link">🎨Coloring</a>
      <a href="draw_color.html" class="topic-link">Drawing🎨Coloring</a>
      <a href="rhymes.html" class="topic-link">🎵 Rhymes & Music</a>
      <a href="avatar.html" class="topic-link">🧒 Personalize Avatar</a>
      <a href="daily.html" class="topic-link">📅 Daily Challenges</a>
    </div>

    <a class="back" href="index.html">⬅️ Back to Home</a>
  </div>

  <!-- Scripts -->
  <script>
    function updatePointsDisplay() {
      let points = localStorage.getItem("totalPoints") || 0;
      document.getElementById("pointsValue").innerText = points;
    }

    function resetPoints() {
      localStorage.setItem("totalPoints", 0);
      updatePointsDisplay();
      alert("Points reset to 0!");
    }

    updatePointsDisplay();

    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>

</body>
</html>
