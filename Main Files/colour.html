<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawing & Coloring</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #ff3399;
      margin-top: 20px;
    }

    #toolbar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }

    #toolbar > * {
      padding: 8px 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    input[type="color"], input[type="range"] {
      padding: 0;
      height: 36px;
    }

    canvas {
      border: 4px solid #ff3399;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 0 10px #ff99cc;
      touch-action: none;
    }

    #download {
      background-color: #66ccff;
      color: white;
    }

    #clear {
      background-color: #ff6666;
      color: white;
    }

    #eraser {
      background-color: #cccccc;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="60" height="60" style="border-radius: 60%; position: fixed; top: 40px; right: 40px; z-index: 999;">
  <h1>🎨 Drawing & Coloring Fun!</h1>

  <div id="toolbar">
    <input type="color" id="colorPicker" value="#ff3399">
    <input type="range" id="brushSize" min="1" max="30" value="5">
    <button id="eraser">Eraser</button>
    <button id="clear">Clear</button>
    <button id="download">Download</button>
  </div>
  <a href="learn.html" class="back-btn">🔙 Back to Learn</a>
  

  <canvas id="drawingCanvas" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const brushSize = document.getElementById('brushSize');
    const eraser = document.getElementById('eraser');
    const clear = document.getElementById('clear');
    const download = document.getElementById('download');

    let drawing = false;
    let currentColor = colorPicker.value;
    let currentBrushSize = brushSize.value;

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseout', end);
    canvas.addEventListener('mousemove', draw);

    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchend', end, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});

    function start(e) {
      drawing = true;
      draw(e);
    }

    function end() {
      drawing = false;
      ctx.beginPath();
    }

    function draw(e) {
      if (!drawing) return;

      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      let x, y;

      if (e.touches) {
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
      } else {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
      }

      ctx.lineWidth = currentBrushSize;
      ctx.lineCap = 'round';
      ctx.strokeStyle = currentColor;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    colorPicker.addEventListener('change', () => {
      currentColor = colorPicker.value;
    });

    brushSize.addEventListener('input', () => {
      currentBrushSize = brushSize.value;
    });

    eraser.addEventListener('click', () => {
      currentColor = "#ffffff"; // Erase to white
    });

    clear.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    download.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'drawing.png';
      link.href = canvas.toDataURL();
      link.click();
    });
    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
</body>
</html>
