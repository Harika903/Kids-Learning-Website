<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Puzzle Matching Game</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%);;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      font-size: 3em;
      color: #ff4081;
      text-shadow: 2px 2px #fff;

    }
    #controls {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    select {
      padding: 10px;
      margin: 0 10px;
      border-radius: 10px;
      border: 2px solid #ff4081;
      font-size: 16px;
      background-color: #fff8f0;
    }
    #game {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }
    #draggables, #dropzones {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 250px;
      padding: 20px;
      border: 3px dashed #ff4081;
      background: #fff8f0;
      width: 45%;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    #draggables img {
      width: 80px;
      height: 80px;
      margin: 10px;
      cursor: grab;
      transition: transform 0.3s;
    }
    #draggables img:active {
      transform: scale(1.2);
    }

    .dropzone {
      width: 80px;
      height: 80px;
      border: 2px dashed #888;
      margin: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffeef2;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.3s;
    }
    .dropzone:hover {
      background-color: #ffd3e3;
      transform: scale(1.05);
    }
    #feedback {
      text-align: center;
      font-size: 20px;
      margin-top: 20px;
      color: #4CAF50;
    }
    #score {
      text-align: center;
      font-size: 18px;
      margin-top: 10px;
      color: #3f51b5;
    }
  </style>
</head>

    function populateLevels() {
      const difficulty = difficultySelect.value;
      levelSelect.innerHTML = "";
      const levels = Object.keys(data[difficulty]);
      levels.forEach(lvl => {
        const option = document.createElement("option");
        option.value = lvl;
        option.textContent = `Level ${lvl}`;
        levelSelect.appendChild(option);
      });
      loadLevel();
    }

    function loadLevel() {
      const difficulty = difficultySelect.value;
      const level = parseInt(levelSelect.value);
      let items = data[difficulty][level];

      const sortedItems = [...items].sort((a, b) => a.name.localeCompare(b.name));
      const shuffledItems = [...items].sort(() => Math.random() - 0.5);

      draggables.innerHTML = '';
      dropzones.innerHTML = '';
      feedback.textContent = '';

      shuffledItems.forEach(item => {
        const img = document.createElement("img");
        img.src = "image/" + item.img;
        img.draggable = true;
        img.id = item.name;
        img.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text/plain", item.name);
        });
        draggables.appendChild(img);
      });

      sortedItems.forEach(item => {
        const zone = document.createElement("div");
        zone.className = "dropzone";
        zone.dataset.match = item.name;

        zone.addEventListener("dragover", e => e.preventDefault());

        zone.addEventListener("drop", e => {
          e.preventDefault();
          const draggedItem = e.dataTransfer.getData("text/plain");
          if (draggedItem === zone.dataset.match) {
            const matchedItem = items.find(i => i.name === draggedItem);
            if (matchedItem) {
              zone.innerHTML = `<img src="image/${matchedItem.img}" alt="${matchedItem.name}" style="width: 80px; height: 80px;" />`;
            }
            feedback.textContent = "✅ Correct Match!";
            correctSound.play();
            points += 5;
            localStorage.setItem('totalPoints', points);
            scoreDisplay.textContent = 'Total Points: ' + points;
            if ([...dropzones.children].every(zone => zone.querySelector("img"))) {
              const today = new Date().toISOString().split('T')[0];
              localStorage.setItem("puzzle_done", "true");
              localStorage.setItem("puzzle_date", today);

              setTimeout(nextLevel, 1000);
            }
          } else {
            feedback.textContent = "❌ Try Again!";
            wrongSound.play();
          }
        });

            //if ([...dropzones.children].every(zone => zone.querySelector("img"))) {
           //   setTimeout(nextLevel, 1000);
          //  }
          //} else {
           // feedback.textContent = "❌ Try Again!";
           // wrongSound.play();
          //}

        dropzones.appendChild(zone);
      });
    }

    function nextLevel() {
      const difficulty = difficultySelect.value;
      let current = parseInt(levelSelect.value);
      const totalLevels = Object.keys(data[difficulty]).length;
      if (current < totalLevels) {
        levelSelect.value = current + 1;
        loadLevel();
      } else {
        feedback.textContent = "🎉 You've completed all levels!";
      }
    }

    difficultySelect.addEventListener("change", populateLevels);
    levelSelect.addEventListener("change", loadLevel);

    window.addEventListener("load", populateLevels);

    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
