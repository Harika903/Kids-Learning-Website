<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz Time!</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #f6d365, #fda085);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      margin-top: 50px;
    }

    h1 {
      color: #d84315;
    }

    .question-box {
      background: #fff3e0;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .options button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #ffb74d;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .options button:hover {
      background: #fb8c00;
    }

    #score, #resultText {
      font-size: 1.2rem;
      margin-top: 15px;
      color: #4e342e;
    }

    .menu {
      margin: 30px auto;
    }

    .menu button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 1rem;
      background: #ff7043;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    #pointsDisplay {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #ffeb3b;
      color: black;
      padding: 10px 15px;
      border-radius: 20px;
      font-weight: bold;
      z-index: 999;
    }

    #backBtn {
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      display: none;
    }

    #backBtn:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="60" height="60" style="border-radius: 60%; position: fixed; top: 70px; right: 30px; z-index: 999;">

  <div id="pointsDisplay">
    🏆 Points: <span id="pointsValue">0</span>
  </div>

  <div class="container">
    <h1>❓ Quiz Time!</h1>

    <div class="menu">
      <button onclick="startQuiz(3)">3 Questions</button>
      <button onclick="startQuiz(5)">5 Questions</button>
      <button onclick="startQuiz(26)">A-Z Quiz</button>
    </div>

    <div id="quiz" class="question-box" style="display: none;">
      <div id="question"></div>
      <div class="options" id="options"></div>
      <div id="resultText"></div>
      <div id="score"></div>
      <button id="backBtn" onclick="goBack()">⬅ Back to Learn</button>
    </div>
  </div>
  <a href="learn.html" class="back-btn">🔙 Back to Learn</a>
  <br>
  <br>
  <a href="daily.html" class="back-btn">🔙 Go to daily tasks</a>
  

  <!-- Sounds -->
  <audio id="correctSound" src="sounds/clap.mp3"></audio>
  <audio id="wrongSound" src="sounds/wrong.mp3"></audio>

  <script>
    const quizData = [
      { question: "A is for?", options: ["Ant", "Apple", "Axe"], answer: "Apple" },
      { question: "B is for?", options: ["Bag", "Bat", "Ball"], answer: "Ball" },
      { question: "C is for?", options: ["Cat", "Cap", "Cup"], answer: "Cat" },
      { question: "D is for?", options: ["Dog", "Doll", "Duck"], answer: "Dog" },
      { question: "E is for?", options: ["Eagle", "Ear", "Egg"], answer: "Egg" },
      { question: "F is for?", options: ["Fan", "Fish", "Fox"], answer: "Fish" },
      { question: "G is for?", options: ["Gift", "Grapes", "Goat"], answer: "Goat" },
      { question: "H is for?", options: ["Horse", "Hat", "House"], answer: "Hat" },
      { question: "I is for?", options: ["Ice cream", "Ink", "Igloo"], answer: "Ice cream" },
      { question: "J is for?", options: ["Jug", "Jelly", "Jam"], answer: "Jam" },
      { question: "K is for?", options: ["Kite", "Key", "Kangaroo"], answer: "Kite" },
      { question: "L is for?", options: ["Leaf", "Lion", "Lamp"], answer: "Lion" },
      { question: "M is for?", options: ["Mango", "Moon", "Monkey"], answer: "Monkey" },
      { question: "N is for?", options: ["Net", "Nest", "Nose"], answer: "Nest" },
      { question: "O is for?", options: ["Orange", "Owl", "Ox"], answer: "Orange" },
      { question: "P is for?", options: ["Pig", "Pen", "Parrot"], answer: "Parrot" },
      { question: "Q is for?", options: ["Quilt", "Queen", "Quail"], answer: "Queen" },
      { question: "R is for?", options: ["Rat", "Rabbit", "Ring"], answer: "Rabbit" },
      { question: "S is for?", options: ["Star", "Sun", "Snake"], answer: "Sun" },
      { question: "T is for?", options: ["Tiger", "Toy", "Tree"], answer: "Tiger" },
      { question: "U is for?", options: ["Urn", "Uniform", "Umbrella"], answer: "Umbrella" },
      { question: "V is for?", options: ["Violin", "Van", "Vase"], answer: "Van" },
      { question: "W is for?", options: ["Watch", "Watermelon", "Whale"], answer: "Watch" },
      { question: "X is for?", options: ["Xmas Tree", "Xylophone", "X-ray"], answer: "Xmas Tree" },
      { question: "Y is for?", options: ["Yacht", "Yarn", "Yak"], answer: "Yak" },
      { question: "Z is for?", options: ["Zebra", "Zoo", "Zip"], answer: "Zebra" }
    ];

    let current = 0;
    let userScore = 0;
    let selectedQuiz = [];

    function startQuiz(qCount) {
      userScore = 0;
      current = 0;
      selectedQuiz = quizData.slice(0, qCount);
      document.getElementById("quiz").style.display = "block";
      document.getElementById("backBtn").style.display = "none";
      showQuestion();
    }

    function showQuestion() {
      const q = selectedQuiz[current];
      document.getElementById("question").innerText = q.question;
      document.getElementById("resultText").innerText = "";
      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optionsDiv.appendChild(btn);
      });

      document.getElementById("score").innerText = "";
    }

    function checkAnswer(ans) {
      const correct = selectedQuiz[current].answer;
      const resultEl = document.getElementById("resultText");

      if (ans === correct) {
        userScore++;
        document.getElementById("correctSound").play();
        resultEl.textContent = "🎉 Correct!";
        //addPoints(1);
      } else {
        document.getElementById("wrongSound").play();
        resultEl.textContent = `❌ Oops! Correct answer is "${correct}"`;
      }

      current++;
      if (current < selectedQuiz.length) {
        setTimeout(showQuestion, 1000);
      } else {
        setTimeout(() => {
          document.getElementById("score").innerText = `You got ${userScore} out of ${selectedQuiz.length} correct!`;
          document.getElementById("backBtn").style.display = "inline-block";
          addPoints(userScore);
          updatePointsDisplay();
          const today = new Date().toISOString().split('T')[0];
          localStorage.setItem("quiz_done", "true");
          localStorage.setItem("quiz_date", today);
        }, 1000);
      }
    }

    function addPoints(p) {
      let currentPoints = parseInt(localStorage.getItem("totalPoints")) || 0;
      currentPoints += p;
      localStorage.setItem("totalPoints", currentPoints);
    }

    function updatePointsDisplay() {
      document.getElementById("pointsValue").innerText = localStorage.getItem("totalPoints") || 0;
    }

    function goBack() {
      window.location.href = "learn.html";
    }

    updatePointsDisplay(); // on page load
    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
</body>
</html>
