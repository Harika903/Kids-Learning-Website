<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Today's Challenges</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to right, #fbc2eb, #a6c1ee);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      min-height: 100vh;
    }
    h1 {
      margin-top: 40px;
      color: #4b0082;
      font-size: 2em;
    }
    .challenge {
      width: 70%;
      margin: 10px;
      padding: 15px 25px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      font-size: 1.2em;
    }
    .completed {
      background-color: #d4f8d4;
      color: green;
    }
    .not-done {
      background-color: #ffdcdc;
      color: #a00;
    }
    .go {
      font-weight: bold;
      color: #007bff;
      cursor: pointer;
    }
    .total {
      margin-top: 30px;
      font-size: 1.5em;
      font-weight: bold;
    }
    .emoji {
      margin-right: 10px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎯 Today's Challenges</h1>
  <a href="learn.html" class="back-btn">🔙 Back to Learn</a>

  <div id="draw" class="challenge hidden">
    <span><span class="emoji">❌</span>Draw & Color</span>
    <span class="go" onclick="goTo('draw_color.html')">Go</span>
  </div>

  <div id="story" class="challenge hidden">
    <span><span class="emoji">❌</span>Read a Story</span>
    <span class="go" onclick="goTo('story.html')">Go</span>
  </div>

  <div id="puzzle" class="challenge hidden">
    <span><span class="emoji">❌</span>Solve Puzzle</span>
    <span class="go" onclick="goTo('puzzle.html')">Go</span>
  </div>

  <div id="letters" class="challenge hidden">
    <span><span class="emoji">❌</span>Learn Letters</span>
    <span class="go" onclick="goTo('alphabets_quiz.html')">Go</span>
  </div>

  <div id="quiz" class="challenge hidden">
    <span><span class="emoji">❌</span>Take Quiz</span>
    <span class="go" onclick="goTo('quiz.html')">Go</span>
  </div>

  

  <div id="rhymes" class="challenge hidden">
    <span><span class="emoji">❌</span>Listen to Rhyme</span>
    <span class="go" onclick="goTo('rhymes.html')">Go</span>
  </div>

  <div class="total" id="totalPoints">Total Points: 0</div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    const today = new Date().toISOString().split('T')[0];
    const totalElement = document.getElementById('totalPoints');
    let totalPoints = 0;

    const allChallenges = [
      { id: 'draw', key: 'draw', label: 'Draw & Color' },
      { id: 'story', key: 'story', label: 'Read a Story' },
      { id: 'puzzle', key: 'puzzle', label: 'Solve Puzzle' },
      { id: 'letters', key: 'letters', label: 'Learn Letters' },
      { id: 'quiz', key: 'quiz', label: 'Take Quiz' },
      { id: 'rhymes', key: 'rhymes', label: 'Listen to Rhyme' }
    ];

    // Shuffle and pick 4 challenges
    const seed = today;
    const hash = Array.from(seed).reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
    function seededShuffle(arr) {
      let array = arr.slice();
      for (let i = array.length - 1; i > 0; i--) {
        const j = hash % (i + 1);
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    const todayChallenges = seededShuffle(allChallenges).slice(0, 4);

    todayChallenges.forEach(challenge => {
      const div = document.getElementById(challenge.id);
      div.classList.remove('hidden');

      const doneDate = localStorage.getItem(`${challenge.key}_date`);
      const done = localStorage.getItem(`${challenge.key}_done`) === 'true';
      const awarded = localStorage.getItem(`${challenge.key}_points_given`) === today;

      if (done && doneDate === today) {
        div.classList.remove('not-done');
        div.classList.add('completed');
        div.innerHTML = `<span>✅ ${challenge.label}</span><span>+20 pts</span>`;

        if (!awarded) {
          totalPoints += 20;
          localStorage.setItem(`${challenge.key}_points_given`, today);
        }
      } else {
        div.classList.add('not-done');
      }
    });

    const previousTotal = parseInt(localStorage.getItem('totalPoints') || '0');
    totalPoints += previousTotal;
    localStorage.setItem('totalPoints', totalPoints);
    totalElement.textContent = `Total Points: ${totalPoints}`;
  </script>
</body>
</html>
