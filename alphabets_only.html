<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alphabet Letters</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      color: #004d99;
      margin-top: 30px;
    }

    .letters-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .letter {
      font-size: 2rem;
      margin: 10px;
      background: #4fc3f7;
      color: white;
      width: 60px;
      height: 60px;
      line-height: 60px;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s;
    }

    .letter:hover {
      background: #0288d1;
    }

    #letterImage {
      margin-top: 20px;
      width: 150px;
      height: 150px;
      object-fit: contain;
    }

    .back {
      display: inline-block;
      margin: 20px;
      background: #ffcc80;
      padding: 10px 20px;
      border-radius: 15px;
      color: #333;
      text-decoration: none;
      transition: background 0.3s;
    }

    .back:hover {
      background: #ffc04d;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="90" height="90" style="border-radius: 60%; position: fixed; top: 30px; right: 90px; z-index: 999;">
  <h1>🔠 Tap a Letter to Hear It!</h1>

  <div class="letters-container" id="lettersContainer"></div>
  <img id="letterImage" src="" alt="" />

  <a class="back" href="learn.html">⬅️ Back to Learn</a>
  <a class="back" href="alphabets_quiz.html"> 🧠 Take Alphabet Quiz </a>

  <script>
    const letters = {
      A: "A.png",
      B: "B.png",
      C: "C.png",
      D: "D.png",
      E: "E.png",
      F: "F.png",
      G: "G.png",
      H: "H.png",
      I: "I.png",
      J: "J.png",
      K: "K.png",
      L: "L.png",
      M: "M.png",
      N: "N.png",
      O: "O.png",
      P: "P.png",
      Q: "Q.png",
      R: "R.png",
      S: "S.png",
      T: "T.png",
      U: "U.png",
      V: "V.png",
      W: "W.png",
      X: "X.png",
      Y: "Y.png",
      Z: "Z.png"
    };

    const container = document.getElementById("lettersContainer");

    Object.keys(letters).forEach(letter => {
      const div = document.createElement("div");
      div.className = "letter";
      div.textContent = letter;
      div.addEventListener("click", () => speakLetter(letter));
      container.appendChild(div);
    });

    function speakLetter(letter) {
      const utterance = new SpeechSynthesisUtterance(letter);
      utterance.lang = 'en-US';
      utterance.pitch = 1.3;
      utterance.rate = 0.9;
      utterance.volume = 1;
      
      const voices = window.speechSynthesis.getVoices();
      const femaleVoice = voices.find(voice => voice.name.includes("Female") || voice.name.includes("Google UK English Female"));
      if (femaleVoice) {
        utterance.voice = femaleVoice;
      }

      speechSynthesis.speak(utterance);

      const img = document.getElementById("letterImage");
      img.src = "image/" + letters[letter];
      img.alt = letter;
    }

    // Wait for voices to load
    window.speechSynthesis.onvoiceschanged = () => {};
    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    } 
  </script>
</body>
</html>
