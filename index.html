<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FunLearn - Kids Education</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #ffffffcc;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
    }

    h1 {
      font-size: 3rem;
      color: #ff4081;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 30px;
      font-size: 1.2rem;
      background: #ff80ab;
      color: white;
      border: none;
      border-radius: 30px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: #f50057;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="60" height="60" style="border-radius: 50%; position: fixed; top: 60px; right: 40px; z-index: 999;">

  <!-- Points Display (added) -->
  <div id="pointsDisplay" style="position: fixed; top: 10px; right: 10px; background: #ffeb3b; color: black; padding: 10px 15px; border-radius: 20px; font-weight: bold; z-index: 999;">
    🏆 Points: <span id="pointsValue">0</span>
  </div>
  <script>
    function updatePointsDisplay() {
      let points = localStorage.getItem("totalPoints") || 0;
      document.getElementById("pointsValue").innerText = points;
    }
    updatePointsDisplay();
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }
  </script>
  <!-- End Points Display -->

  <div class="container">
    <h1>🎉 Welcome to FunLearn!</h1>
    <a href="learn.html" class="btn">📘 Start Learning</a>
    <a href="rewards.html" class="btn">🏅 My Rewards</a>
  </div>

</body>
</html>
