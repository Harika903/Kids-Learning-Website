<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Your Avatar</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to right, #fbc2eb, #a6c1ee);
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #ff3399;
    }

    .avatar-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }

    .avatar-grid img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      cursor: pointer;
      border: 4px solid transparent;
      transition: transform 0.3s, border-color 0.3s;
    }

    .avatar-grid img:hover {
      transform: scale(1.1);
    }

    .avatar-grid img.selected {
      border-color: #ff3399;
      box-shadow: 0 0 15px #ff3399;
    }

    #preview {
      margin-top: 30px;
    }

    #preview img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #333;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #ff66cc;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #ff3399;
    }
  </style>
</head>
<body>

  <h1>👧 Choose Your Avatar 👦</h1>

  <div class="avatar-grid" id="avatarGrid">
    <img src="image/avatar1.png" onclick="selectAvatar(this)">
    <img src="image/avatar2.png" onclick="selectAvatar(this)">
    <img src="image/avatar3.png" onclick="selectAvatar(this)">
    <img src="image/avatar4.png" onclick="selectAvatar(this)">
    <img src="image/avatar5.png" onclick="selectAvatar(this)">
    <img src="image/avatar6.png" onclick="selectAvatar(this)">
    <img src="image/avatar7.png" onclick="selectAvatar(this)">
    <img src="image/avatar8.png" onclick="selectAvatar(this)">
    <img src="image/avatar9.png" onclick="selectAvatar(this)">
    <img src="image/avatar10.png" onclick="selectAvatar(this)">
    <img src="image/avatar11.png" onclick="selectAvatar(this)">
    <img src="image/avatar12.png" onclick="selectAvatar(this)">
    <img src="image/avatar13.png" onclick="selectAvatar(this)">
    <!-- Add more avatars if needed -->
  </div>

  <div id="preview" style="display:none;">
    <h2>Your Avatar:</h2>
    <img id="avatarPreview" src="">
    <br>
    <button onclick="saveAvatar()">Save Avatar</button>
  </div>
  <a class="back" href="learn.html">⬅️ Back to Learn</a>

  <script>
    let selectedSrc = "";

    function selectAvatar(imgElement) {
      const allAvatars = document.querySelectorAll('.avatar-grid img');
      allAvatars.forEach(img => img.classList.remove('selected'));

      imgElement.classList.add('selected');
      selectedSrc = imgElement.getAttribute('src');
      document.getElementById("preview").style.display = "block";
      document.getElementById("avatarPreview").src = selectedSrc;
    }

    function saveAvatar() {
      if (selectedSrc) {
        localStorage.setItem("kidAvatar", selectedSrc);
        alert("✅ Avatar saved successfully!");
        /*window.location.href = "learn.html"; // or homepage*/
      }
    }
  </script>

</body>
</html>
