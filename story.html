<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moral Stories - FunLearn</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ffe0b2, #ffccbc);
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #d84315;
    }

    .language-buttons {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      background: #ff7043;
      color: white;
      cursor: pointer;
    }

    .story {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 10px auto;
      max-width: 600px;
      box-shadow: 0 0 10px #bbb;
    }

    audio {
      margin-top: 10px;
      width: 100%;
    }

    .back {
      display: block;
      margin: 20px auto;
      text-align: center;
      text-decoration: none;
      background: #ffccbc;
      padding: 10px 20px;
      border-radius: 20px;
      color: #d84315;
      width: max-content;
    }
  </style>
</head>
<body>
  <img id="userAvatar" alt="Your Avatar" width="70" height="70" style="border-radius: 60%; position: fixed; top: 50px; right: 40px; z-index: 999;">
  <h1>📖 Moral Stories</h1>

  <div class="language-buttons">
    <button onclick="showStories('english')">English Stories</button>
    <button onclick="showStories('telugu')">తెలుగు కథలు</button>
  </div>

  <div id="stories"></div>
  <a href="daily.html" class="back-btn" >🔙 Go to daily tasks</a>

  <a href="learn.html" class="back">⬅️ Back to Learn</a>
  <br>

    <script>
    const stories = {
      english: [
        {
          title: "Kittu played with Butterflies",
          story: "Once upon a time in a green forest, there lived a little bunny named kittuu. kittu loved to hop and play with butterflies. One sunny day, he found a magical carrot that could talk! The carrot said, “Let’s go on an adventure!” And so, they danced, played, and laughed together. It was the best day ever!.",
          moral: "Be content with what you have.",
          audio: "sounds/story1.mp3"
        },
        
        {
          title: "The Honest Woodcutter",
          story: "A woodcutter dropped his axe into a river. A fairy appeared and offered him a golden axe. He refused. Then she offered a silver one. He refused again. Finally, she gave his real axe. She was impressed and rewarded him with all three.",
          moral: "Honesty is the best policy.",
          audio: "sounds/story2.mp3"
        },
        {
          title: "The Lion and the Mouse",
          story: "A lion caught a tiny mouse. The mouse pleaded for mercy and promised to help the lion someday. The lion laughed but let him go. Days later, the lion was caught in a net. The mouse came and chewed the ropes to free him.",
          moral: "Kindness is never wasted.",
          audio: "sounds/story3.mp3"
        },
        {
          title: "The rabbit and the Tortoise",

          audio: "sounds/story4.mp3"
        },
        {
          title: "The Boy Who Cried Wolf",

        {

        {

          audio: "sounds/story9.mp3"
        },
        
        
        
        
      
        {
          title: "The Greedy Dog",

      telugu: [
        {
          title: "లోబడి కుక్క",
          story: "ఒక రోజు ఒక కుక్కకి రోడ్డుపై మాంసపు ముక్క దొరికింది. అది ఎంతో ఆనందంగా ఆ ముక్కను పట్టుకొని నది మీద ఉన్న వంతెనపైకి వెళ్లింది. నీటిలో తన ప్రతిబింబాన్ని చూసి,ఇంకో కుక్క ఉంది! దాని ముక్కను కూడా తీసుకుందాం!అని అనుకుంది. వెంటనే అరవగా దూకింది. కానీ నిజానికి అది నీటిలో తన ప్రతిబింబం మాత్రమే. కుక్క మాంసపు ముక్కను కూడా కోల్పోయింది.",
          moral: "మనకు ఉన్నదానితో సంతృప్తిగా ఉండాలి.",
          audio: "sounds/story11.mp3"
        },
        {
          title: "నిజాయితీ కల వడ్రంగి",
          story: "ఒకసారి ఒక వడ్రంగి చెట్టును కొడుతున్నాడు. అనుకోకుండా అతని గొడ్డలి నదిలో పడిపోయింది. దాన్ని వెతుకుతూ దేవత ప్రత్యక్షమైంది. ఆమె బంగారు గొడ్డలిని చూపి, ఇది నాదేనా? అని అడిగింది. వడ్రంగి కాదు అన్నాడు. తరువాత వెండి గొడ్డలిని చూపింది. వడ్రంగి అది కూడా తనది కాదని చెప్పాడు. చివరికి తన గొడ్డలిని చూపగా, ఇది నాదే అని అన్నాడు. దేవత అతని నిజాయితీకి గౌరవంగా మూడూ గొడ్డలులు అతనికి ఇచ్చింది..",
          moral: "నిజాయితీ ఎంతో మేలు చేస్తుంది.",
          audio: "sounds/story12.mp3"
        },
        {
          title: "సింహం మరియు ఎలుక",
          story: "ఒక రోజు చిన్న ఎలుక ఒక సింహం మీద నడిచింది. కోపంగా సింహం దానిని పట్టేసింది. ఎలుక మన్నించమని, ఒక రోజు నేను నీకు ఉపయోగపడతాను అని చెప్పింది. సింహం నవ్వుతూ వదిలేసింది. కొన్ని రోజులకు సింహం వేటగాళ్ల వలలో చిక్కుకుంది. అప్పుడు ఎలుక వచ్చి తాడులు కొరికింది. సింహం విముక్తి పొందింది..",
          moral: "ప్రయత్నిస్తే దారి దొరుకుతుంది.",
          audio: "sounds/story13.mp3"
        },
        {
          title: "నక్క మరియు ద్రాక్ష",
          story: "ఒక నక్కకి బాగా ఆకలేసింది. అది చెట్టుపై ఉన్న ద్రాక్ష పండ్లను చూసి తినాలని ప్రయత్నించింది. చాలా దూకినా వాటిని తినలేకపోయింది. అప్పుడు కోపంగా, వీటికి రుచి ఉండదేమో! అని చెప్పి అక్కడినుండి వెళ్లిపోయింది.",
          moral: "దొరకనిది చెడిందని అనడం సులువు",
          audio: "sounds/story14.mp3"
        },
        {
          title: "మందగమనే తాబేలు",
          story: "ఒకసారి కుందేలు తాబేలు మీద నవ్వింది – నీవు చాలా మందగమనంగా నడుస్తావని. అప్పుడు తాబేలు ఒక రేస్ కి సవాల్ విసిరింది. రేస్ మధ్యలో కుందేలు నిద్రపోయింది, కానీ తాబేలు నెమ్మదిగా నడిచి గమ్యాన్ని చేరుకుంది.",
          moral: "నెమ్మదిగా కానీ పట్టుదలతో ముందుకెళ్లాలి.",
          audio: "sounds/story15.mp3"
        },
        {
          title: "బాలుడు - నక్క",
          story: "ఒక చిన్న పిల్లవాడు గ్రామంలో గొర్రెలు కాపాడేవాడు. సరదాగా నక్క వచ్చింది! అని అబద్ధంగా అరవేవాడు. గ్రామస్థులు పరుగెత్తుకొని వచ్చేవారు, కానీ నక్క ఉండదు. ఇలా ఎన్నిసార్లు చేశాడు. ఒక రోజు నిజంగా నక్క వచ్చింది. బాలుడు అరవినా ఎవ్వరు రాలేదు. నక్క గొర్రెలన్నీ తినేసింది.",
          moral: "అబద్ధాలు చెబితే ఎవరూ నమ్మరు.",
          audio: "sounds/story16.mp3"
        },
        {
          title: "కట్టెల కట్ట",
          story: "ఒక తండ్రికి ముగ్గురు కుమారులు ఉండేవారు. వారు తరచూ గొడవపడేవారు. ఒకరోజు తండ్రి వారికి ఒక్కో కట్టె ఇచ్చి విరగోట్టమన్నాడు– వాళ్లు సులువుగా విరగోట్టారు. తరువాత తండ్రి కట్టెల కట్టనిచ్చాడు – ఎవ్వరూ  వీరగోట్టలేకపోయారు అప్పుడు తండ్రి ఐక్యతలో శక్తి ఉంది అని చెప్పాడు. ",
          moral: "ఐక్యతే బలం.",
          audio: "sounds/story17.mp3"
        },
        {
          title: " పిట్ట గూడు",
          story: "ఒక చిన్న పిట్ట తాను ఉండటానికి గూడు కట్టింది.దానికోసం రోజూ కొమ్మలు తెచ్చి కష్టపడి అల్లింది.వర్షం వచ్చినప్పుడు పిట్ట తన గూడు లోపల సేఫ్గా ఉండిపోయింది.ఇతర పిట్టలు తడిసి బాధపడ్డాయి",
          moral: "ముందుగానే పని చేసుకుంటే కష్టాలు రావు..", 
          audio: "sounds/story18.mp3"
        },
        {
          title: "టోపీ అమ్మకందారు మరియు కోతులు",
          story: "ఒక టోపీ అమ్మే వ్యక్తి చెట్టు క్రింద నిద్రపోయాడు. కొంతసేపటికి కోతులు అతని బ్యాగ్ నుండి టోపీలు తీసుకొని వేసుకున్నాయి. అతను కోపంగా తన టోపీ తీసి నేలపై కొట్టాడు. కోతులు అదే పనిని మిమిక్రీ చేసాయి. అప్పుడు అతను తెలివిగా కోతుల్ని అనుకరింపజేసి టోపీలన్నీ తిరిగి సంపాదించుకున్నాడు.",
          moral: "తెలివిగా ఆలోచించాలి.",
          audio: "sounds/story19.mp3"
        }
      ]
    };

    function showStories(language) {
      const container = document.getElementById("stories");
      container.innerHTML = "";

      stories[language].forEach(story => {
        container.innerHTML += `
          <div class="story">
            <h3>${story.title}</h3>
            <p><strong>Story:</strong> ${story.story}</p>
            <p><strong>Moral:</strong> ${story.moral}</p>
            <audio controls class="story-audio">
              <source src="${story.audio}" type="audio/mpeg">
              Your browser does not support the audio element.
            </audio>
          </div>
        `;
      });
      markStoryAsDone();
      setTimeout(() => {
        const audioElements = document.querySelectorAll(".story-audio");
        audioElements.forEach((audio) => {
          audio.addEventListener("play", () => {
            audioElements.forEach((otherAudio) => {
              if (otherAudio !== audio) {
                otherAudio.pause();
                otherAudio.currentTime = 0;
              }
            });
          });
        });
      }, 100);
    }
    function markStoryAsDone() {
      const today = new Date().toISOString().split('T')[0];
      localStorage.setItem("story_done", "true");
      localStorage.setItem("story_date", today);
    }
    // Avatar script
    const avatarPath = localStorage.getItem("kidAvatar");
    if (avatarPath) {
      document.getElementById("userAvatar").src = avatarPath;
    } else {
      document.getElementById("userAvatar").style.display = "none";
    }  
  </script>
</body>
</html>
